<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportar Problema - Baños de Agua Santa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="/styles-form.css"/>
</head>
<body>

<div id="loading-bar"></div>

<div id="header">
  <i class="fas fa-exclamation-triangle" style="font-size:20px;color:#ffc107;"></i>
  <div>
    <h1>Reportar un Problema</h1>
    <div class="subtitle">Baños de Agua Santa — Administra tu ciudad</div>
  </div>
</div>

<div id="main">

  <div id="map"></div>

  <div id="form-panel">
    <div id="form-content">

      <div class="form-section">
        <div class="form-title">
          <i class="fas fa-map-marker-alt"></i> Ubicacion del problema
        </div>
        <p class="form-hint">Haz clic en el mapa para ubicar el problema, o escribe las coordenadas manualmente.</p>
        <div class="coord-row">
          <div class="coord-field">
            <label>Latitud</label>
            <input id="lat" type="number" step="any" placeholder="-1.3928">
          </div>
          <div class="coord-field">
            <label>Longitud</label>
            <input id="lng" type="number" step="any" placeholder="-78.4364">
          </div>
        </div>
        <div id="coord-status" class="coord-status">
          <i class="fas fa-crosshairs"></i> Selecciona un punto en el mapa
        </div>
      </div>

      <div class="form-section">
        <div class="form-title">
          <i class="fas fa-list-ul"></i> Tipo de problema
        </div>
        <select id="tipo_problema">
          <option value="">-- Selecciona una opcion --</option>
          <option value="bache_via">Bache en via</option>
          <option value="alumbrado_deficiente">Alumbrado publico deficiente</option>
          <option value="basura_acumulada">Basura acumulada / limpieza</option>
          <option value="deslave">Deslave / derrumbe</option>
          <option value="inundacion">Inundacion / anegamiento</option>
          <option value="senalizacion">Falta de senalizacion</option>
          <option value="acera_danada">Acera danada / peatonal</option>
          <option value="arbol_caido">Arbol caido / rama peligrosa</option>
          <option value="fuga_agua">Fuga de agua / alcantarillado</option>
          <option value="peligro_volcanico">Peligro volcanico / lahar</option>
          <option value="falla_geologica">Falla geologica visible</option>
          <option value="vialidad_peligrosa">Vialidad peligrosa</option>
          <option value="contaminacion">Contaminacion ambiental</option>
          <option value="otro">Otro</option>
        </select>
      </div>

      <div class="form-section">
        <div class="form-title">
          <i class="fas fa-comment-dots"></i> Descripcion del problema
        </div>
        <textarea id="comentario" rows="4" placeholder="Describe brevemente el problema que observas..."></textarea>
      </div>

      <div class="form-section">
        <div class="form-title">
          <i class="fas fa-user"></i> Datos de contacto <span class="optional">(opcional)</span>
        </div>
        <input id="nombre" type="text" placeholder="Tu nombre">
        <input id="telefono" type="tel" placeholder="Tu telefono">
      </div>

      <button id="btn-enviar" class="btn-enviar" onclick="enviarReporte()">
        <i class="fas fa-paper-plane"></i> Enviar Reporte
      </button>

      <div id="form-msg"></div>

      <div class="form-footer">
        <a href="/index.html"><i class="fas fa-map"></i> Volver al Geoportal</a>
      </div>

    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="/src/form.js"></script>
</body>
</html>
